<svg xmlns="http://www.w3.org/2000/svg" width="350" height="50" viewBox="0 0 350 50">
  <!-- Icono verde estilo Lucide LayoutTemplate -->
  <rect x="5" y="10" width="35" height="35" rx="4" fill="none" stroke="#22c55e" stroke-width="3"/>
  <rect x="10" y="15" width="25" height="10" rx="1" fill="#22c55e"/>
  <rect x="10" y="30" width="10" height="10" rx="1" fill="#22c55e"/>
  <rect x="25" y="30" width="10" height="10" rx="1" fill="#22c55e"/>
  
  <!-- Texto Sparse en Blanco -->
  <text x="55" y="42" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">Sparse</text>
  
  <!-- Texto Excel en Verde -->
  <text x="180" y="42" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="36" font-weight="bold" fill="#22c55e">Excel</text>
  
  <!-- 3D en Blanco (opcional) -->
  <text x="275" y="42" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">3D</text>
